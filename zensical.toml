[project]
site_name    = "Flying Circus Platform"
site_url     = "https://flyingcircus.io/doc"
copyright    = "Flying Circus Internet Operations GmbH"
docs_dir     = "src"
site_dir     = "_build/en"
extra_css    = ["_static/flyingcircus.css"]

[project.theme]
language = "en"
variant  = "classic"
logo     = "_static/RZ_FC-Logo_RGB_100-1080.svg"
features = [
    "content.code.copy",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme      = "default"
primary     = "custom"
accent      = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme      = "slate"
primary     = "custom"
accent      = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Fira Sans"

[project.extra]
alternate = [
    { name = "English", link = "/en/", lang = "en" },
    { name = "Deutsch", link = "/de/", lang = "de" },
]

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums     = true
line_spans          = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.zensical.extensions.macros]
module_name = "docs_hooks"

# Zensical validates links from guide/ before registering reference/ and
# infrastructure/ pages (alphabetical ordering bug), producing false-positive
# "page does not exist" warnings for cross-section links whose HTML output is
# correct. Disable the check until upstream fixes the ordering issue.
[project.validation]
invalid_links = false
